# Locker temático de Omarchy — colores y fondo cambian con el tema
# (omarchy-theme-set reescribe los $color de abajo y el symlink del fondo)
source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/omarchy/current/background   # mismo fondo que el escritorio/tema
    color = $color
    blur_passes = 3
    blur_size = 8
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 350, 60
    position = 0, -30
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 3
    rounding = 8

    font_family = JetBrainsMono Nerd Font
    font_color = $font_color

    placeholder_text = <i>Contraseña…</i>
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    dots_size = 0.25
    dots_spacing = 0.3
    fade_on_empty = false
}

# Reloj
label {
    monitor =
    text = $TIME
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    color = $font_color
    position = 0, 120
    halign = center
    valign = center
}

# Fecha
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d de %B"
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = $font_color
    position = 0, 60
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = false
}
